<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro da Empresa</title>
<link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
    <h1>EATNOW</h1>

    <nav>
        <a href="index.html">Início</a>
        <a href="entregador.html">Cadastrar Entregador</a>
        <a href="fornecedor.html">Cadastrar Fornecedor</a>
        <a href="produto.html">Cadastro dos Produtos</a>
        <a href="funcionario.html">Cadastro do Funcionário</a>
    </nav>
</header>

<main>

    <h2 class="titulo">Cadastro da Empresa</h2>

    <div class="form-container">

        <div class="form-group">
            <label>ID da Empresa</label>
            <input type="text" placeholder="Ex: 001">
        </div>

        <div class="form-group">
            <label>Nome Fantasia</label>
            <input type="text" placeholder="Ex: Pizzaria do João">
        </div>

        <div class="form-group">
            <label>Razão Social</label>
            <input type="text" placeholder="Ex: João LTDA">
        </div>

        <div class="form-group">
            <label>CNPJ</label>
            <input type="text" placeholder="00.000.000/0000-00">
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="text" placeholder="(00) 00000-0000">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="empresa@email.com">
        </div>

        <div class="form-group">
            <label>Endereço</label>
            <input type="text" placeholder="Rua, número, bairro">
        </div>

        <a href="empresa.html" class="finalizar">Cadastrar Empresa</a>

    </div>

</main>

<footer>
    <div class="footer-container">
        <div>
            <h3>Sobre</h3>
            <p>Sistema de delivery fictício para estudo.</p>
        </div>

        <div>
            <h3>Links</h3>

        </div>

        <div>
            <h3>Contato</h3>
            <p>Email: contato@delivery.com</p>
        </div>
    </div>

    <p class="copy">© 2026 Sistema Delivery</p>
</footer>

</body>
</html>
