<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro Entregador</title>
<link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
    <h1>EATNOW</h1>

    <nav>
        <a href="index.html">Início</a>
        <a href="Cempresa.html">Empresa</a>
        <a href="veiculo.html">Cadastrar seu Veiculo</a>
    </nav>
</header>

<main>

    <h2 class="titulo">Cadastro de Entregador</h2>

    <div class="form-container">

        <div class="form-group">
            <label>ID do Entregador</label>
            <input type="text" placeholder="Ex: 001">
        </div>

        <div class="form-group">
            <label>Nome</label>
            <input type="text" placeholder="Nome completo">
        </div>

        <div class="form-group">
            <label>Veículo</label>
            <select>
                <option>Selecione</option>
                <option>Moto</option>
                <option>Bicicleta</option>
                <option>Carro</option>
            </select>
        </div>

        <div class="form-group">
            <label>CNH</label>
            <input type="text" placeholder="Número da CNH">
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="text" placeholder="(00) 00000-0000">
        </div>

        <button class="btn">Cadastrar Entregador</button>

    </div>

</main>

<footer>
    <div class="footer-container">
        <div>
            <h3>Sobre</h3>
            <p>Sistema de delivery fictício para estudo.</p>
        </div>

        <div>
            <h3>Links</h3>
            <p><a href="index.html">Início</a></p>
        </div>

        <div>
            <h3>Contato</h3>
            <p>Email: contato@delivery.com</p>
        </div>
    </div>

    <p class="copy">© 2026 Sistema Delivery</p>
</footer>

</body>
</html>
