<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro Cliente</title>
<link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
    <h1>EATNOW</h1>

    <nav>
        <a href="index.html">Início</a>
    </nav>
</header>

<main>

    <h2 class="titulo">Cadastro de Cliente</h2>

    <div class="form-container">

        <div class="form-group">
            <label>ID do Cliente</label>
            <input type="text" placeholder="Ex: 001">
        </div>

        <div class="form-group">
            <label>Nome</label>
            <input type="text" placeholder="Digite o nome completo">
        </div>

        <div class="form-group">
            <label>CPF</label>
            <input type="text" placeholder="000.000.000-00">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="cliente@email.com">
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="text" placeholder="(00) 00000-0000">
        </div>

        <div class="form-group">
            <label>Endereço</label>
            <input type="text" placeholder="Rua, número, bairro">
        </div>

        <button class="btn">Cadastrar Cliente</button>

    </div>

</main>

<footer>
    <div class="footer-container">
        <div>
            <h3>Sobre</h3>
            <p>Sistema de delivery fictício para estudo.</p>
        </div>

        <div>
            <h3>Links</h3>
            <p><a href="index.html">Início</a></p>
        </div>

        <div>
            <h3>Contato</h3>
            <p>Email: contato@delivery.com</p>
        </div>
    </div>

    <p class="copy">© 2026 Sistema Delivery</p>
</footer>

</body>
</html>
